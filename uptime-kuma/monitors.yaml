# Uptime Kuma Monitor Configuration
# Sync with: ssh homelab "cd ~/homelab && op run --env-file=.env.tpl -- uptime-kuma/.venv/bin/python uptime-kuma/sync.py"
# IMPORTANT: sync.py must run ON THE HOMELAB SERVER — it connects to localhost:3010. Never run locally or on VPS.
#
# Secrets are referenced via environment variables (loaded from 1Password)
# - UPTIME_MONITOR_TOKEN: Cloudflare WAF bypass token
# - BETTERSTACK_API_KEY: BetterStack API key
# - FPP_SERVER_AUTH: FPP Server authorization token

settings:
  # Default settings for all monitors (can be overridden per monitor)
  defaults:
    interval: 60
    timeout: 90
    maxretries: 3
    retry_interval: 60
    accepted_statuscodes: ['200-299']
    method: GET

  # Cloudflare WAF bypass header (applied to all external monitors)
  cloudflare_bypass_header:
    X-Uptime-Monitor: '${UPTIME_MONITOR_TOKEN}'

groups:
  # ============================================
  # HomeLab - Local Docker container monitoring
  # ============================================
  - name: HomeLab
    interval: 250
    monitors:
      # --- Infrastructure subgroup ---
      - name: Infrastructure
        type: group
        interval: 200
        monitors:
          - name: Glance - Docker
            type: docker
            docker_container: glance
            interval: 148
            timeout: 120
            maxretries: 5

          - name: Glance - HTTP
            type: http
            url: https://glance.jkrumm.com/
            interval: 150
            cloudflare_bypass: true

          - name: Dozzle - Docker
            type: docker
            docker_container: dozzle
            interval: 153
            timeout: 120
            maxretries: 5

          - name: Dozzle - HTTP
            type: http
            url: http://dozzle:8081/
            interval: 155

          - name: Docker Socket Proxy - Docker
            type: docker
            docker_container: docker-socket-proxy
            interval: 115
            timeout: 120
            maxretries: 5

          - name: Docker Socket Proxy Watchtower - Docker
            type: docker
            docker_container: docker-socket-proxy-watchtower
            interval: 116
            timeout: 120
            maxretries: 5

          - name: Caddy - Docker
            type: docker
            docker_container: caddy
            interval: 118
            timeout: 120
            maxretries: 5

          - name: Cloudflared - Docker
            type: docker
            docker_container: cloudflared
            interval: 121
            timeout: 120
            maxretries: 5

          - name: Watchtower - Docker
            type: docker
            docker_container: watchtower
            interval: 127
            timeout: 120
            maxretries: 5

          - name: Uptime Kuma - Docker
            type: docker
            docker_container: uptime-kuma
            interval: 130
            timeout: 120
            maxretries: 5

          - name: Samba - Docker
            type: docker
            docker_container: samba
            interval: 133
            timeout: 120
            maxretries: 5

          - name: Beszel - Docker
            type: docker
            docker_container: beszel
            interval: 136
            timeout: 120
            maxretries: 5

          - name: Beszel Agent - Docker
            type: docker
            docker_container: beszel-agent
            interval: 139
            timeout: 120
            maxretries: 5

          - name: Restic Backup - Docker
            type: docker
            docker_container: restic-backup
            interval: 142
            timeout: 120
            maxretries: 5

          # Push monitors
          # NOTE: Created manually in UI (uptime-kuma-api 1.2.1 doesn't support UK 2.x push creation)
          - name: HomeLab Watchdog - Push
            type: push
            interval: 700 # Cron runs every 10 min (600s) + buffer for execution
            timeout: 48
            retry_interval: 700

          - name: Restic Backup - Push
            type: push
            interval: 90000 # 25h — daily 03:30 backup cron + buffer
            timeout: 48
            retry_interval: 90000

          # BetterStack external monitoring (verifies public accessibility)
          - name: Uptime Kuma - Uptime
            type: http
            url: https://uptime.betterstack.com/api/v2/monitors/3001641
            interval: 130
            timeout: 120
            maxretries: 5
            headers:
              Authorization: 'Bearer ${BETTERSTACK_API_KEY}'

      # --- Files subgroup ---
      - name: Files
        type: group
        interval: 215
        monitors:
          - name: FileBrowser - Docker
            type: docker
            docker_container: filebrowser
            interval: 170
            timeout: 120
            maxretries: 5

          - name: Dufs - Docker
            type: docker
            docker_container: dufs
            interval: 173
            timeout: 120
            maxretries: 5

          - name: Public Files - HTTP
            type: http
            url: https://public.jkrumm.com/
            interval: 179
            cloudflare_bypass: true

      # --- Immich subgroup ---
      - name: Immich
        type: group
        interval: 220
        monitors:
          - name: Immich Server - Docker
            type: docker
            docker_container: immich_server
            interval: 165
            timeout: 120
            maxretries: 5

          - name: Immich ML - Docker
            type: docker
            docker_container: immich_machine_learning
            interval: 170
            timeout: 120
            maxretries: 5

          - name: Immich Redis - Docker
            type: docker
            docker_container: immich_redis
            interval: 175
            timeout: 120
            maxretries: 5

          - name: Immich Postgres - Docker
            type: docker
            docker_container: immich_postgres
            interval: 180
            timeout: 120
            maxretries: 5

          - name: Immich - HTTP
            type: http
            url: https://immich.jkrumm.com/api/server/ping
            interval: 185
            cloudflare_bypass: true
            accepted_statuscodes: ['200-299']

          - name: Immich - Uptime
            type: http
            url: https://uptime.betterstack.com/api/v2/monitors/3069484
            interval: 140
            timeout: 120
            maxretries: 5
            headers:
              Authorization: 'Bearer ${BETTERSTACK_API_KEY}'

      # --- CouchDB subgroup ---
      - name: CouchDB
        type: group
        interval: 245
        monitors:
          - name: CouchDB - Docker
            type: docker
            docker_container: couchdb
            interval: 195
            timeout: 120
            maxretries: 5

          - name: CouchDB - HTTP
            type: http
            url: http://couchdb:5984/_up
            interval: 200
            accepted_statuscodes: ['200-299']

      # --- Karakeep subgroup (read-later; web + chrome crawler + meili search) ---
      - name: Karakeep
        type: group
        interval: 248
        monitors:
          - name: Karakeep - Docker
            type: docker
            docker_container: karakeep
            interval: 202
            timeout: 120
            maxretries: 5

          - name: Karakeep Chrome - Docker
            type: docker
            docker_container: karakeep-chrome
            interval: 205
            timeout: 120
            maxretries: 5

          - name: Karakeep Meili - Docker
            type: docker
            docker_container: karakeep-meili
            interval: 208
            timeout: 120
            maxretries: 5

          # Reachable over the cloudflared bridge that UK shares with Karakeep — no
          # Cloudflare/Tailscale hop, like CouchDB. Health endpoint is unauthenticated.
          - name: Karakeep - HTTP
            type: http
            url: http://karakeep:3000/api/health
            interval: 211
            accepted_statuscodes: ['200-299']

      # --- Image Share subgroup (personal photo library — single public host
      # share.jkrumm.com: share links at the root, admin UI under /admin, API
      # under /api) ---
      - name: Image Share
        type: group
        interval: 246
        monitors:
          - name: Image Share - Docker
            type: docker
            docker_container: image-share
            interval: 213
            timeout: 120
            maxretries: 5

          - name: Image Share - HTTP
            type: http
            url: https://share.jkrumm.com/health
            interval: 216
            cloudflare_bypass: true
            accepted_statuscodes: ['200-299']

  # ============================================
  # Local — heartbeats kept alive by a manual/local operation on the Mac, NOT by
  # HomeLab server infrastructure. Grouped separately so a miss here does NOT
  # drag the HomeLab group "down" and imply the server is offline. Down here just
  # means a local op is overdue (run it), not a server incident.
  # ============================================
  - name: Local
    interval: 250
    monitors:
      # Garmin heartbeat — pushed by argo's garmin-sync cron (VPS) after each
      # successful collector pull. Goes down when Garmin OAuth tokens expire.
      # Recovery is automated: homelab's garmin-auto-relogin cron refreshes the
      # token proactively (every 4d) and reactively (within ~2h of an early death)
      # via Gmail-fetched MFA. The 12h interval gives that auto-recovery room to
      # heal silently before paging; a genuinely-stuck recovery (>12h) still alerts.
      # NOTE: Created manually in UI (uptime-kuma-api 1.2.1 doesn't support UK 2.x push creation)
      # Push URL → 1Password common/garmin-collector/PUSH_URL (in `common/` so the
      # VPS service account can read it; argo resolves it as GARMIN_HEARTBEAT_URL).
      - name: Garmin Collector - Push
        type: push
        interval: 43200 # 12h — argo sync runs every 6h; extra cycle = silent auto-recovery room
        timeout: 48
        retry_interval: 43200
        resend_interval: 1 # re-alert Slack every down beat (~12h) once recovery is genuinely stuck

      # Weekly manual 1Password export backup, run locally from the Mac.
      # NOTE: Created manually in UI (uptime-kuma-api 1.2.1 doesn't support UK 2.x push creation)
      - name: 1Password Backup - Push
        type: push
        interval: 691200 # 8 days — weekly manual + buffer
        retry_interval: 691200

      # Weekly secrets-cache seed-freshness heartbeat, pushed from the Mac mini
      # (dotfiles/scripts/secrets-freshness-check.sh, weekly LaunchAgent). A
      # miss/down means "the mini's secret cache is stale — run make secrets-seed".
      # NOTE: Created manually in UI (uptime-kuma-api 1.2.1 can't create push monitors on UK 2.x)
      - name: MacMini Secret Seed - Push
        type: push
        interval: 691200 # 8 days — weekly + buffer
        retry_interval: 691200

  # ============================================
  # Hermes Agent — runs locally on Mac Mini, not on HomeLab.
  # Push monitors fed by hermes-agent/scripts/{hermes-liveness,hermes-backup}.sh
  # See hermes-agent/README.md "Cron — Liveness + Backup".
  # ============================================
  - name: Hermes Agent
    interval: 250
    monitors:
      # Liveness — every 5 min from hermes-liveness.sh.
      # Push URL → 1Password hermes/uptime-kuma/agent-push-url
      - name: Hermes Agent - Push
        type: push
        interval: 360 # 5 min cron + buffer
        timeout: 48
        retry_interval: 360

      # Watchdog — every 30 min from the watchdog cron (watchdog-slack.py → watchdog-poll.py).
      # Push URL → 1Password hermes/uptime-kuma/watchdog-push-url
      - name: Hermes Watchdog - Push
        type: push
        interval: 2100 # 35 min — 30 min cron + buffer
        timeout: 48
        retry_interval: 2100

      # Daily backup → /mnt/hdd/backups/hermes/ from hermes-backup.sh at 03:00.
      # Push URL → 1Password hermes/uptime-kuma/backup-push-url
      - name: Hermes Backup - Push
        type: push
        interval: 90000 # 25h — daily cron at 03:00 + buffer
        retry_interval: 90000

  # ============================================
  # VPS (Hetzner) - hetzner-vps infrastructure
  # ============================================
  - name: VPS
    interval: 250
    monitors:
      # --- Networking subgroup ---
      - name: Networking
        type: group
        interval: 200
        monitors:
          # DNS points to VPS Tailscale IP (no Cloudflare proxy) — direct Tailscale path.
          # tailscale-only middleware passes since Uptime Kuma's source IP is HomeLab's Tailscale IP.
          - name: Traefik - HTTP
            type: http
            url: https://traefik.jkrumm.com/api/overview
            interval: 121

          - name: RollHook - HTTP
            type: http
            url: https://rollhook.jkrumm.com/health
            interval: 131
            cloudflare_bypass: true

      # --- Monitoring subgroup ---
      - name: Monitoring
        type: group
        interval: 210
        monitors:
          - name: HyperDX - HTTP
            type: http
            url: https://hyperdx.jkrumm.com
            interval: 141

          - name: ClickStack OTel - HTTP
            type: http
            url: http://${VPS_TAILSCALE_IP}:13133/
            interval: 131
            accepted_statuscodes: ['200-299']

          - name: Umami - HTTP
            type: http
            url: https://umami.jkrumm.com/api/heartbeat
            interval: 151

      # --- Infra subgroup ---
      - name: Infra
        type: group
        interval: 205
        monitors:
          # NOTE: Created manually in UI (uptime-kuma-api 1.2.1 doesn't support UK 2.x push creation)
          # After creating: copy push URL → 1Password vps/config/UPTIME_KUMA_PUSH_URL
          - name: Postgres - Backup - Push
            type: push
            interval: 90000 # 25h — daily cron at 03:00 UTC + buffer
            retry_interval: 90000

          # Liveness — VPS cron runs SELECT 1 every minute via scripts/health-pg.sh.
          # Push URL → op://vps/config/UPTIME_KUMA_POSTGRES_PUSH_URL
          - name: Postgres - DB - Push
            type: push
            interval: 120 # 2 min — cron runs every 60s + buffer
            timeout: 48
            retry_interval: 120

          # Image CDN (imgproxy) — TWO monitors on purpose, they fail differently.
          #
          # Do NOT probe imgproxy's /health: it is liveness only (verified — it
          # emits no OTLP spans and answers in 1.6ms). An imgproxy that cannot
          # reach B2 still reports healthy while every image 404s, so /health
          # would be a green light over a dead service.
          #
          # Both URLs render a real 12KB probe object, so a 200 means the whole
          # path worked. Source: vps/apps/imgproxy/, docs/image-cdn.md.

          # Public edge path — DNS → Cloudflare → tunnel → Traefik → imgproxy.
          # Renditions carry a 1-year TTL, so after the first check this is
          # answered from the CF edge. That is intentional: this monitor watches
          # the PUBLIC path (DNS, tunnel, CF), not the origin. It will stay green
          # through an origin outage — which is exactly what the Origin monitor
          # below is for. Do not "fix" this one by cache-busting; losing the edge
          # signal would hide a tunnel or DNS failure.
          - name: ImageCDN - HTTP
            type: http
            url: https://img.jkrumm.com/rs:fit:100/misc/monitor-probe.jpg
            interval: 165
            cloudflare_bypass: true

          # Origin path — grey-cloud A record → VPS Tailscale IP → Traefik,
          # bypassing Cloudflare entirely, so EVERY check does a real B2 fetch
          # plus a real libvips render. This is the monitor that actually proves
          # the image pipeline works: it goes red on an expired/revoked B2 key,
          # an unreachable bucket, or a broken imgproxy, none of which the edge
          # monitor or a /health probe would catch.
          # Reached over Tailscale from homelab, so no CF bypass header.
          - name: ImageCDN Origin - HTTP
            type: http
            url: https://img-origin.jkrumm.com/rs:fit:100/misc/monitor-probe.jpg
            interval: 175

      # --- Services subgroup ---
      - name: Services
        type: group
        interval: 215
        monitors:
          - name: BunEmailApi - HTTP
            type: keyword
            url: https://bun-email-api.jkrumm.com/health
            keyword: '{"ok":true}'
            interval: 161
            cloudflare_bypass: true

          # Argo nested folder — dashboard + API on VPS, Tailscale-only via
          # Traefik. Single host argo.jkrumm.com (dashboard at /, API at /api,
          # Traefik strips the /api prefix). DNS is grey-cloud → VPS Tailscale
          # IP, so probes work from homelab UK over Tailscale (no CF bypass).
          # Per uptime-kuma-monitors rule: parent folder provides "Argo" scope,
          # children drop the prefix.
          - name: Argo
            type: group
            interval: 200
            monitors:
              - name: Dashboard - HTTP
                type: http
                url: https://argo.jkrumm.com/
                interval: 145
                accepted_statuscodes: ['200-299']

              - name: API - HTTP
                type: keyword
                url: https://argo.jkrumm.com/api/health
                keyword: '"status":"ok"'
                interval: 150

          # Audio Gateway — OpenAI-compatible STT + Gemini TTS on VPS, Tailscale-
          # only via Traefik. DNS is grey-cloud → VPS Tailscale IP, so the homelab
          # UK probe reaches it over Tailscale (no CF bypass). /health returns
          # {"ok":true} when healthy, 503 while draining.
          - name: Audio Gateway - HTTP
            type: keyword
            url: https://audio-gateway.jkrumm.com/health
            keyword: '"ok":true'
            interval: 150

          # Research Gateway — agentic HTTP research API on VPS, public via the
          # Cloudflare tunnel (orange-cloud) → Traefik. /health → {"status":"ok"}.
          - name: Research Gateway - HTTP
            type: keyword
            url: https://research.jkrumm.com/health
            keyword: '{"status":"ok"}'
            cloudflare_bypass: true
            interval: 155

  # ============================================
  # FreePlanningPoker - VPS application stack
  # ============================================
  - name: FreePlanningPoker
    interval: 205
    monitors:
      - name: FPP - Frontend - HTTP
        type: http
        url: https://free-planning-poker.com/
        ip_family: 6 # Force IPv6 (IPv4 path has issues)
        cloudflare_bypass: true

      - name: FPP - Server - HTTP
        type: keyword
        url: https://server.free-planning-poker.com/health
        keyword: '{"status":"ok"}'
        ip_family: 6
        cloudflare_bypass: true
        headers:
          Authorization: 'Bearer ${FPP_SERVER_AUTH}'

      - name: FPP - Analytics - HTTP
        type: keyword
        url: https://analytics.free-planning-poker.com/health
        keyword: '"status":"ok"'
        interval: 70
        ip_family: 6
        cloudflare_bypass: true

      - name: FPP - DB - MySQL
        type: mysql
        # Connection details (host, port, user, password, query, SSL) configured
        # in the Uptime Kuma UI — sync.py skips DB monitor updates by design
        # (see DB_MONITOR_TYPES in sync.py) so the password is never in git
        # and survives every future sync. Password lives in
        # op://vps/mariadb/FPP_PASSWORD — paste into UI when creating/rotating.

      - name: FPP - DB Backup - Push
        type: push
        interval: 90000 # 25h — daily cron at 03:30 UTC + buffer
        retry_interval: 90000

      - name: FPP - Analytics Readmodel - Push
        type: push
        interval: 650
        retry_interval: 650

  # ============================================
  # Websites - External website monitoring
  # ============================================
  - name: Websites
    interval: 215
    monitors:
      - name: Photos - HTTP
        type: http
        url: https://photos.jkrumm.com/
        ip_family: 6
        cloudflare_bypass: true

      - name: Photos - Uptime
        type: http
        url: https://uptime.betterstack.com/api/v2/monitors/3670427
        interval: 145
        timeout: 120
        maxretries: 5
        headers:
          Authorization: 'Bearer ${BETTERSTACK_API_KEY}'
        cloudflare_bypass: true

      # Disabled monitors
      # - name: SnowFinder
      #   type: http
      #   url: https://snow-finder.jkrumm.dev/
      #   active: false
      #   cloudflare_bypass: true
