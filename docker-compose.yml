name: homelab

services:
  # Read-only socket proxy for monitoring services (Glance, Dozzle, Beszel, UptimeKuma)
  # POST=0 — no write operations possible
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    environment:
      # Read-only access to container/image info
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 1
      VOLUMES: 1
      EVENTS: 1 # Dozzle: real-time container event stream
      VERSION: 1 # Docker clients negotiate API version on connect
      # Disable all write operations
      POST: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      socket-proxy:
    labels:
      glance.hide: true

  # Write-enabled socket proxy for Watchtower only (POST+DELETE required for pull/stop/recreate)
  # Isolated on its own network — monitoring proxy is unaffected
  docker-socket-proxy-watchtower:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy-watchtower
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      INFO: 1
      VERSION: 1
      POST: 1 # required: stop/start/pull/recreate
      DELETE: 1 # required: remove old containers after update
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - socket-proxy-watchtower
    labels:
      glance.hide: true
      com.centurylinklabs.watchtower.enable: "false"

  caddy:
    image: caddybuilds/caddy-cloudflare:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    networks:
      - cloudflared
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - /home/jkrumm/homelab-private/config/caddy:/etc/caddy/private:ro
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - HOMELAB_TAILSCALE_IP=${HOMELAB_TAILSCALE_IP}
    labels:
      glance.parent: uptime
      glance.name: Caddy
      glance.hide: false
      com.centurylinklabs.watchtower.enable: "true"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run ${CLOUDFLARE_TUNNEL_ID}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN}
    volumes:
      - ./config/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    depends_on:
      - caddy
      - glance
      - uptime-kuma
      - immich-server
      - dufs
    networks:
      - cloudflared
    labels:
      glance.parent: uptime
      glance.name: Cloudflared
      glance.hide: false

  samba:
    image: ghcr.io/servercontainers/samba
    container_name: samba
    restart: unless-stopped
    ports:
      - "139:139"
      - "445:445"
    environment:
      AVAHI_NAME: StorageServer
      MODEL: "Macmini"
      SAMBA_CONF_LOG_LEVEL: 3
      ACCOUNT_jkrumm: ${SAMBA_PASSWORD}
      SAMBA_GLOBAL_CONFIG: "[global]; min protocol=SMB3; smb encrypt=desired; ea support=yes; vfs objects=fruit streams_xattr; fruit:metadata=stream; fruit:model=MacSamba; fruit:veto_appledouble=no; fruit:nfs_aces=no; fruit:wipe_intentionally_left_blank_rfork=yes; fruit:delete_empty_adfiles=yes; fruit:posix_rename=yes"
      SAMBA_VOLUME_CONFIG_ssd: "[SSD]; path=/mnt/ssd; valid users=jkrumm; guest ok=no; read only=no; browseable=yes; comment=SSD"
      SAMBA_VOLUME_CONFIG_hdd: "[HDD]; path=/mnt/hdd; valid users=jkrumm; guest ok=no; read only=no; browseable=yes; comment=HDD"
    volumes:
      - /home/jkrumm/ssd:/mnt/ssd
      - /mnt/hdd:/mnt/hdd
    labels:
      glance.name: Samba
      glance.icon: si:protondrive
      glance.url: https://files.jkrumm.com
      glance.hide: false

  beszel:
    image: henrygd/beszel
    container_name: beszel
    restart: unless-stopped
    networks:
      - cloudflared
      - beszel
    volumes:
      - /mnt/hdd/beszel:/beszel_data
    labels:
      glance.name: Beszel
      glance.icon: si:graylog
      glance.url: https://beszel.jkrumm.com
      glance.hide: false

  beszel-agent:
    image: "henrygd/beszel-agent"
    container_name: beszel-agent
    restart: unless-stopped
    ports:
      - "${HOMELAB_TAILSCALE_IP}:45876:45876"
    networks:
      - beszel
      - socket-proxy
    volumes:
      - /mnt/hdd/.beszel:/extra-filesystems/hdd:ro
    environment:
      PORT: 45876
      KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIInimIOc9SESgXhpaYcyJWwf/JZmP7WSvHtdqhPqMZEf"
      FILESYSTEMS: /sda/sda3
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    depends_on:
      - docker-socket-proxy
    labels:
      glance.hide: true

  glance:
    image: glanceapp/glance
    container_name: glance
    volumes:
      - ./config:/app/config
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8080:8080"
    networks:
      - cloudflared
      - socket-proxy
    environment:
      - IMMICH_API_KEY=${IMMICH_API_KEY}
    depends_on:
      - docker-socket-proxy
    restart: unless-stopped
    labels:
      glance.name: Glance
      glance.parent: uptime
      glance.icon: si:hashnode
      glance.url: https://glance.jkrumm.com
      glance.hide: false

  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    container_name: duplicati
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - SETTINGS_ENCRYPTION_KEY=${DUPLICATI_ENCRYPTION_KEY}
      - DUPLICATI__WEBSERVICE_PASSWORD=${DUPLICATI_WEBSERVICE_PASSWORD}
    # - CLI_ARGS= #optional
    volumes:
      - /mnt/hdd/duplicati/config:/config
      - /mnt/transfer/duplicati_backups:/backups
      - /home/jkrumm/ssd:/source/ssd
      - /mnt:/source/mnt
    networks:
      - cloudflared
    restart: unless-stopped
    labels:
      glance.name: Duplicati
      glance.icon: si:duplicati
      glance.url: https://duplicati.jkrumm.com
      glance.hide: false

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /home/jkrumm/.docker/config.json:/config.json:ro
    networks:
      - socket-proxy-watchtower
      - watchtower-egress
    depends_on:
      - docker-socket-proxy-watchtower
    environment:
      TZ: Europe/Berlin
      DOCKER_HOST: tcp://docker-socket-proxy-watchtower:2375
      DOCKER_CONFIG: /
      DOCKER_API_VERSION: "1.44"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"
      WATCHTOWER_NOTIFICATION_URL: "ntfy://:${NTFY_TOKEN}@ntfy.jkrumm.com/homelab-watchtower"
      WATCHTOWER_NOTIFICATIONS_LEVEL: warn
      WATCHTOWER_NO_STARTUP_MESSAGE: "true"
      WATCHTOWER_WARN_ON_HEAD_FAILURE: never
    labels:
      glance.parent: uptime
      glance.name: Watchtower
      glance.icon: si:watchtower
      glance.hide: false
      com.centurylinklabs.watchtower.enable: "false" # don't self-update

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3010:3001"
    networks:
      - cloudflared
      - socket-proxy
    environment:
      - SQLITE_BUSY_TIMEOUT=30000
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    # Note: IPv6 not available in Docker bridge network. VPS monitors have
    # increased retries (3x) to handle intermittent IPv4 timeouts from
    # Deutsche Telekom routing issues to Cloudflare.
    volumes:
      - /home/jkrumm/ssd/uptime-kuma:/app/data
    depends_on:
      - docker-socket-proxy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    labels:
      glance.name: Uptime Kuma
      glance.icon: si:uptimekuma
      glance.url: https://uptime.jkrumm.com
      glance.hide: false
      glance.id: uptime

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    environment:
      DOZZLE_HOSTNAME: HomeLab
      DOZZLE_ADDR: :8081
      DOZZLE_AUTH_PROVIDER: simple
      DOZZLE_AUTH_TTL: 87600h
      DOZZLE_REMOTE_AGENT: ${SIDEPROJECT_DOCKER_STACK_IP}:7007,${VPS_TAILSCALE_IP}:7007
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    volumes:
      - ./dozzle:/data
    networks:
      - cloudflared
      - socket-proxy
    depends_on:
      - docker-socket-proxy
    labels:
      glance.name: Dozzle
      glance.icon: si:logstash
      glance.url: https://dozzle.jkrumm.com
      glance.hide: false

  dozzle-watchdog-logs:
    container_name: homelab-watchdog-logs
    image: alpine
    volumes:
      - /var/log/homelab_watchdog.log:/var/log/stream.log
    command:
      - tail
      - -f
      - /var/log/stream.log
    network_mode: none
    restart: unless-stopped
    labels:
      glance.hide: true
      com.centurylinklabs.watchtower.enable: "false"

  dozzle-backup-logs:
    container_name: database-backup-logs
    image: alpine
    volumes:
      - /mnt/hdd/backups/backup.log:/var/log/stream.log
    command:
      - tail
      - -f
      - /var/log/stream.log
    network_mode: none
    restart: unless-stopped
    labels:
      glance.hide: true
      com.centurylinklabs.watchtower.enable: "false"

  calibre:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre
    security_opt:
      - seccomp=unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - CUSTOM_USER=jkrumm
      - PASSWORD=${CALIBRE_PASSWORD}
    volumes:
      - /home/jkrumm/ssd/SSD/Bücher/calibre/config:/config
      - /home/jkrumm/ssd/SSD/Bücher/calibre/library:/library
    networks:
      - cloudflared
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    labels:
      glance.hide: true

  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - DOCKER_MODS=linuxserver/mods:universal-calibre|linuxserver/mods:calibre-web-calibre
    volumes:
      - /home/jkrumm/ssd/SSD/Bücher/calibre-web/config:/config
      - /home/jkrumm/ssd/SSD/Bücher/calibre/library:/books
    networks:
      - cloudflared
    restart: unless-stopped
    labels:
      glance.name: Calibre Web
      glance.icon: si:calibreweb
      glance.url: https://books.jkrumm.com
      glance.hide: false

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    extends:
      file: config/hwaccel.transcoding.yml
      service: quicksync
    volumes:
      - /home/jkrumm/ssd/SSD/Bilder/immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      # External library - read-only mount for Fuji photos
      - /home/jkrumm/ssd/SSD/Bilder/Fuji:/mnt/media/fuji:ro
    ports:
      - "2283:2283"
    networks:
      - cloudflared
      - immich
    environment:
      - UPLOAD_LOCATION=/usr/src/app/upload
      - DB_USERNAME=postgres
      - DB_PASSWORD=${POSTGRES_DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - DB_HOSTNAME=immich_postgres
      - REDIS_HOSTNAME=immich_redis
      - TZ=Europe/Berlin
    depends_on:
      - immich_redis
      - immich_postgres
    deploy:
      resources:
        limits:
          memory: 4G
    labels:
      glance.name: Immich
      glance.icon: si:immich
      glance.url: https://immich.jkrumm.com
      glance.hide: false
      com.centurylinklabs.watchtower.enable: "false" # managed by /upgrade-stack immich

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:release-openvino
    restart: unless-stopped
    extends:
      file: config/hwaccel.ml.yml
      service: openvino
    volumes:
      - model-cache:/cache
    networks:
      - immich
    environment:
      - REDIS_HOSTNAME=immich_redis
      - TZ=Europe/Berlin
    deploy:
      resources:
        limits:
          memory: 4G
    labels:
      glance.hide: true
      com.centurylinklabs.watchtower.enable: "false" # managed by /upgrade-stack immich

  immich_redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:3eeb09785cd61ec8e3be35f8804c8892080f3ca21934d628abc24ee4ed1698f6
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1
    networks:
      - immich
    labels:
      glance.hide: true
      com.centurylinklabs.watchtower.enable: "false" # digest-pinned, managed by /upgrade-stack immich

  immich_postgres:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - /home/jkrumm/ssd/SSD/Bilder/immich/postgres:/var/lib/postgresql/data
    networks:
      - immich
    labels:
      glance.hide: true
      com.centurylinklabs.watchtower.enable: "false" # digest-pinned, managed by /upgrade-stack immich

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - /home/jkrumm/ssd/SSD:/srv/ssd
      - /mnt/hdd:/srv/hdd
      - /mnt/hdd/filebrowser:/database
      - /mnt/hdd/filebrowser:/config
    networks:
      - cloudflared
    labels:
      glance.name: Filebrowser
      glance.icon: si:files
      glance.url: https://files.jkrumm.com
      glance.hide: false

  dufs:
    image: sigoden/dufs:latest
    container_name: dufs
    restart: unless-stopped
    command: >
      /data -A
      --auth @/
      --auth jkrumm:${DUFS_PASSWORD}@/:rw
      --enable-cors
      --hidden .DS_Store,.git,Thumbs.db
    volumes:
      - /home/jkrumm/ssd/SSD/Public:/data
    ports:
      - "8098:5000"
    networks:
      - cloudflared
    labels:
      glance.name: Dufs Public Files
      glance.icon: si:files
      glance.url: https://public.jkrumm.com
      glance.hide: false

  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    restart: unless-stopped
    command: serve
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./config/ntfy/server.yml:/etc/ntfy/server.yml:ro
      - /home/jkrumm/ssd/ntfy:/var/lib/ntfy
    ports:
      - "127.0.0.1:8093:80" # localhost-only; watchdog (host cron) uses this directly
    environment:
      # VAPID keys: public key also passed via env for reliable loading
      # Private key and email kept out of git — injected via op run
      NTFY_WEB_PUSH_PUBLIC_KEY: "BLi5DS2Y8JqIpW0LYajag_SE58hOc57jRLFXj4DTIZ5S7beUsylAnG5CUcnxc47u6X8gN937qPdeZRCxv52Z9So"
      NTFY_WEB_PUSH_PRIVATE_KEY: ${NTFY_WEB_PUSH_PRIVATE_KEY}
      NTFY_WEB_PUSH_EMAIL_ADDRESS: ${NTFY_WEB_PUSH_EMAIL_ADDRESS}
    networks:
      - cloudflared
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      glance.name: ntfy
      glance.icon: si:ntfy
      glance.url: https://ntfy.jkrumm.com
      glance.hide: false

  couchdb:
    image: couchdb:3
    container_name: couchdb
    restart: unless-stopped
    environment:
      - COUCHDB_USER=jkrumm
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    volumes:
      - /home/jkrumm/ssd/couchdb/data:/opt/couchdb/data
      - ./config/couchdb/local.ini:/opt/couchdb/etc/local.d/local.ini
    networks:
      - cloudflared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5984/_up"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      glance.name: CouchDB
      glance.icon: si:couchbase
      glance.url: https://couchdb.jkrumm.com
      glance.hide: false


volumes:
  model-cache:
  caddy_data:
  caddy_config:

networks:
  cloudflared:
    driver: bridge
  immich:
    driver: bridge
  beszel:
    driver: bridge
  socket-proxy:
    driver: bridge
    internal: true # No external access needed
  socket-proxy-watchtower:
    driver: bridge
    internal: true # No external access needed
  watchtower-egress:
    driver: bridge # Internet access for ntfy.jkrumm.com (notification relay)
